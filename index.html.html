<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mana Market</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f1f8e9;
    margin:0;
    padding:0;
}
.header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
}
.header img{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:4px;
    display:block;
    margin:0 auto 8px;
}
.card{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:5px;
    margin-top:5px;
}
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    box-sizing:border-box;
}
.veg{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}
.total{
    font-size:20px;
    font-weight:bold;
    color:#2e7d32;
}
.cartRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    border-bottom:1px solid #eee;
}
.qtyBtn{
    width:26px;
    padding:2px;
    margin:0 4px;
    display:inline-block;
}
.removeBtn{
    background:#c62828;
    width:auto;
    padding:5px 10px;
    margin:0 0 0 10px;
}
#loginScreen{
    max-width:400px;
    margin:40px auto;
    padding:20px;
}
#loginScreen h2{
    text-align:center;
    color:#2e7d32;
}
#shopContent{
    display:none;
}
.hint{
    font-size:12px;
    color:#666;
    margin-top:4px;
}
</style>
</head>

</div>

<div class="card" id="loginScreen">
<h2>Login to Order</h2>
<div id="mobileStep">
<input id="loginName" placeholder="Your Name">
<input id="loginMobile" placeholder="Mobile Number" maxlength="10">
<p class="hint">We will send a one-time OTP to verify this number.</p>
<button onclick="sendOtp()">Send OTP</button>
</div>
<div id="otpStep" style="display:none;">
<input id="otpCode" placeholder="Enter OTP" maxlength="6">
<button onclick="verifyOtp()">Verify OTP</button>
</div>
<div id="loginStatus" class="hint"></div>
<div id="recaptcha-container"></div>
</div>

<div id="shopContent">
<div class="card">
<h3>Fresh Vegetables</h3>
<div class="veg">
Brinjal (వంకాయ) - ₹30/kg
<button onclick="addCart(&quot;Brinjal&quot;,30)">Add To Cart</button>
</div>
<div class="veg">
Tomato (టమాటా) - ₹25/kg
<button onclick="addCart(&quot;Tomato&quot;,25)">Add To Cart</button>
</div>
<div class="veg">
Onion (ఉల్లిపాయ) - ₹40/kg
<button onclick="addCart(&quot;Onion&quot;,40)">Add To Cart</button>
</div>
<div class="veg">
Potato (బంగాళాదుంప) - ₹35/kg
<button onclick="addCart(&quot;Potato&quot;,35)">Add To Cart</button>
</div>
</div>
<div class="card">
<h3>Cart</h3>
<div id="cartItems">No items selected</div>
<p class="total">
Total: ₹<span id="total">0</span>
</p>
<button onclick="checkout()">
Confirm Order
</button>
</div>
<div class="card">
<h3>Customer Details</h3>
<input id="name" placeholder="Customer Name" readonly>
<input id="mobile" placeholder="Mobile Number" readonly>
<input id="address" placeholder="Address">
<button onclick="logout()" style="background:#c62828;margin-top:10px;">Logout</button>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const PHONE="919876543210";

let confirmationResult=null;
let currentUser={name:"",mobile:"",uid:"",lat:null,lng:null};
let cart={};

function setStatus(msg){
document.getElementById("loginStatus").innerText=msg;
}

function setupRecaptcha(){
if(window.recaptchaVerifier){return;}
window.recaptchaVerifier=new firebase.auth.RecaptchaVerifier("recaptcha-container",{
size:"invisible"
});
}

function sendOtp(){
let name=document.getElementById("loginName").value.trim();
let mobile=document.getElementById("loginMobile").value.trim();

if(name===""){
alert("Enter your name");
return;
}
if(!/^[0-9]{10}$/.test(mobile)){
alert("Enter a valid 10-digit mobile number");
return;
}

currentUser.name=name;
currentUser.mobile=mobile;

setupRecaptcha();
setStatus("Sending OTP...");

let phoneNumber="+91"+mobile;
auth.signInWithPhoneNumber(phoneNumber,window.recaptchaVerifier)
.then(function(result){
confirmationResult=result;
document.getElementById("mobileStep").style.display="none";
document.getElementById("otpStep").style.display="block";
setStatus("OTP sent to +91"+mobile);
})
.catch(function(error){
setStatus("");
alert("Could not send OTP: "+error.message);
});
}

function verifyOtp(){
let code=document.getElementById("otpCode").value.trim();
if(code===""){
alert("Enter the OTP");
return;
}
setStatus("Verifying...");
confirmationResult.confirm(code)
.then(function(result){
currentUser.uid=result.user.uid;
captureLocationAndProceed();
})
.catch(function(error){
setStatus("");
alert("Invalid OTP. Please try again.");
});
}

function captureLocationAndProceed(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
function(pos){
currentUser.lat=pos.coords.latitude;
currentUser.lng=pos.coords.longitude;
saveLoginAndEnterShop();
},
function(err){
saveLoginAndEnterShop();
}
);
}else{
saveLoginAndEnterShop();
}
}

function saveLoginAndEnterShop(){
db.collection("customers").doc(currentUser.uid).set({
name:currentUser.name,
mobile:currentUser.mobile,
lat:currentUser.lat,
lng:currentUser.lng,
lastLogin:firebase.firestore.FieldValue.serverTimestamp()
},{merge:true});

document.getElementById("name").value=currentUser.name;
document.getElementById("mobile").value=currentUser.mobile;
document.getElementById("loginScreen").style.display="none";
document.getElementById("shopContent").style.display="block";
}

auth.onAuthStateChanged(function(user){
if(user){
db.collection("customers").doc(user.uid).get().then(function(doc){
if(doc.exists){
let data=doc.data();
currentUser.uid=user.uid;
currentUser.name=data.name;
currentUser.mobile=data.mobile;
document.getElementById("name").value=currentUser.name;
document.getElementById("mobile").value=currentUser.mobile;
document.getElementById("loginScreen").style.display="none";
document.getElementById("shopContent").style.display="block";
}
});
}
});

function logout(){
auth.signOut();
currentUser={name:"",mobile:"",uid:"",lat:null,lng:null};
cart={};
renderCart();
document.getElementById("name").value="";
document.getElementById("mobile").value="";
document.getElementById("address").value="";
document.getElementById("loginName").value="";
document.getElementById("loginMobile").value="";
document.getElementById("otpCode").value="";
document.getElementById("mobileStep").style.display="block";
document.getElementById("otpStep").style.display="none";
setStatus("");
document.getElementById("shopContent").style.display="none";
document.getElementById("loginScreen").style.display="block";
}

function addCart(item,price){
if(cart[item]){
cart[item].qty+=1;
}else{
cart[item]={price:price,qty:1};
}
renderCart();
}

function changeQty(item,delta){
if(!cart[item])return;
cart[item].qty+=delta;
if(cart[item].qty<=0){
delete cart[item];
}
renderCart();
}

function removeItem(item){
delete cart[item];
renderCart();
}

function renderCart(){
let container=document.getElementById("cartItems");
let items=Object.keys(cart);
if(items.length===0){
container.innerHTML="No items selected";
document.getElementById("total").innerText=0;
return;
}
let total=0;
let html="";
items.forEach(function(item){
let line=cart[item];
let lineTotal=line.price*line.qty;
total+=lineTotal;
html+=
'<div class="cartRow">'+
'<span>'+item+' - ₹'+line.price+'/kg</span>'+
'<span>'+
'<button class="qtyBtn" onclick="changeQty(&quot;'+item+'&quot;,-1)">-</button>'+
line.qty+
'<button class="qtyBtn" onclick="changeQty(&quot;'+item+'&quot;,1)">+</button>'+
' = ₹'+lineTotal+
'<button class="removeBtn" onclick="removeItem(&quot;'+item+'&quot;)">Remove</button>'+
'</span>'+
'</div>';
});
container.innerHTML=html;
document.getElementById("total").innerText=total;
}

function checkout(){
let customer=document.getElementById("name").value.trim();
let mobile=document.getElementById("mobile").value.trim();
let address=document.getElementById("address").value.trim();

if(customer===""||mobile===""){
alert("Please login first");
return;
}
if(address===""){
alert("Enter Delivery Address");
return;
}
if(Object.keys(cart).length===0){
alert("Your cart is empty");
return;
}

let total=0;
let itemLines=[];
Object.keys(cart).forEach(function(item){
let line=cart[item];
let lineTotal=line.price*line.qty;
total+=lineTotal;
itemLines.push(item+" x"+line.qty+" - ₹"+lineTotal);
});

db.collection("orders").add({
uid:currentUser.uid,
name:customer,
mobile:mobile,
address:address,
items:itemLines,
total:total,
